name: team-task-chain-automation

on:
  issues:
    types: [opened, reopened, labeled, assigned]

permissions:
  issues: write

jobs:
  issue-routing:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            const isTesterSource = labels.has('source:tester') || issue.user?.login === 'TesterHelen';
            if (!isTesterSource) return;

            ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));
            ['bug','source:tester','role:coder-linus','role:reviewer-leon','role:tester-helen','status:triage'].forEach(l => labels.add(l));

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels]
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['CoderLinus']
            }).catch(() => {});

  linus-auto-kickoff:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    needs: issue-routing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            // re-fetch latest labels after issue-routing job updates
            const { data: latest } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const labels = new Set((latest.labels || []).map(l => typeof l === 'string' ? l : l.name));
            const hasTesterSource = labels.has('source:tester');
            const hasLinusRole = labels.has('role:coder-linus');
            if (!hasTesterSource || !hasLinusRole) return;

            // move status:triage -> status:in-dev
            ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));
            labels.add('status:in-dev');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels]
            });

            // ensure Linus is assigned
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['CoderLinus']
            }).catch(() => {});

            // idempotent kickoff comment
            const marker = '[linus-kickoff:v2]';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });
            const alreadyPosted = comments.some(c => (c.body || '').includes(marker));
            if (alreadyPosted) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `${marker} @CoderLinus kickoff: this tester-reported bug is now in **status:in-dev**.\n\nPlease start implementation and open a PR; request review from @LeonReviewer and @TesterHelen once ready.`
            });
