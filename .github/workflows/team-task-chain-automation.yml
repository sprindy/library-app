name: team-task-chain-automation

on:
  issues:
    types: [opened, reopened, labeled, assigned]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, review_requested, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-routing:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Route Helen-reported bugs to Linus
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));

            const isTesterSource = labels.has('source:tester') || issue.user?.login === 'TesterHelen';
            if (!isTesterSource) return;

            const desiredLabels = [
              'bug', 'source:tester',
              'role:coder-linus', 'role:reviewer-leon', 'role:tester-helen',
              'status:triage'
            ];

            const statusLabels = ['status:triage', 'status:in-dev', 'status:in-review', 'status:qa', 'status:done'];
            const next = new Set(labels);
            for (const l of statusLabels) next.delete(l);
            desiredLabels.forEach(l => next.add(l));

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...next]
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['CoderLinus']
            }).catch(() => {});

  linus-autostart-pr:
    if: github.event_name == 'issues' && (
          (github.event.action == 'assigned' && github.event.assignee.login == 'CoderLinus') ||
          (github.event.action == 'labeled' && github.event.label.name == 'status:triage')
        )
    runs-on: ubuntu-latest
    steps:
      - name: Check issue state and avoid duplicate kickoff
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            const ok = labels.has('role:coder-linus') && labels.has('status:triage');
            if (!ok) {
              core.setOutput('run', 'false');
              return;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });
            const exists = comments.data.some(c => (c.body || '').includes('AUTO_KICKOFF_LINUS'));
            core.setOutput('run', exists ? 'false' : 'true');

      - name: Move status to in-dev and post kickoff
        if: steps.gate.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            ['status:triage','status:qa','status:in-review','status:done'].forEach(l => labels.delete(l));
            labels.add('status:in-dev');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels]
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '🤖 AUTO_KICKOFF_LINUS',
                '@CoderLinus start implementation now.',
                'Automation will open a draft PR scaffold if credentials are configured.',
                'Required reviewers: @LeonReviewer @TesterHelen'
              ].join('\n')
            });

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT != ''
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODERLINUS_PAT }}

      - name: Create Linus branch + draft PR scaffold
        if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.CODERLINUS_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq .title)
          BRANCH="fix/issue-${ISSUE_NUMBER}-autostart"

          git config user.name "CoderLinus"
          git config user.email "coder.linus@protonmail.com"

          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          mkdir -p .github/autostart
          cat > .github/autostart/issue-${ISSUE_NUMBER}.md <<EOF
          # Auto-start scaffold for issue #${ISSUE_NUMBER}
          Title: ${ISSUE_TITLE}

          This scaffold was generated automatically to start Linus' execution flow.
          Replace with real implementation commits.
          EOF

          git add .github/autostart/issue-${ISSUE_NUMBER}.md
          git commit -m "chore(autostart): scaffold for issue #${ISSUE_NUMBER}" || true
          git push -u origin "$BRANCH" || true

          # Create PR if not exists
          EXISTING=$(gh pr list --search "head:${BRANCH}" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "wip: issue #${ISSUE_NUMBER} implementation kickoff" \
              --body "Auto-start PR scaffold for #${ISSUE_NUMBER}.\n\nCloses #${ISSUE_NUMBER}\n\n- [ ] Linus: implement fix\n- [ ] Leon: review\n- [ ] Helen: QA" \
              --draft
          fi

      - name: Label PR + request reviewers (autostart branch)
        if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.CODERLINUS_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="fix/issue-${ISSUE_NUMBER}-autostart"
          PR_NUMBER=$(gh pr list --search "head:${BRANCH}" --json number --jq '.[0].number')
          [ -z "$PR_NUMBER" ] && exit 0
          gh pr edit "$PR_NUMBER" --add-label role:reviewer-leon --add-label role:tester-helen --add-label status:in-review || true
          gh pr edit "$PR_NUMBER" --remove-label status:triage --remove-label status:in-dev || true
          gh pr edit "$PR_NUMBER" --add-reviewer LeonReviewer --add-reviewer TesterHelen || true

      - name: Missing PAT warning
        if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT == ''
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '⚠️ `CODERLINUS_PAT` secret is missing. I moved status to `in-dev` but cannot auto-create branch/PR as @CoderLinus yet.'
            });

  pr-routing:
    if: github.event_name == 'pull_request_target' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Apply role/status labels and request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const issue_number = pr.number;

            const current = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const labels = new Set(current.data.map(l => l.name));
            const statusLabels = ['status:triage', 'status:in-dev', 'status:in-review', 'status:qa', 'status:done'];
            for (const l of statusLabels) labels.delete(l);
            ['role:reviewer-leon', 'role:tester-helen', 'status:in-review'].forEach(l => labels.add(l));

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: [...labels]
            });

            const reviewerCandidates = ['LeonReviewer', 'TesterHelen'];
            const reviewers = reviewerCandidates.filter(r => r.toLowerCase() !== (pr.user?.login || '').toLowerCase());
            if (reviewers.length) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers
              }).catch(() => {});
            }

  review-status-sync:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Sync PR labels from review state
        uses: actions/github-script@v7
        with:
          script: |
            const review = context.payload.review;
            const pr = context.payload.pull_request;
            const reviewer = (review.user?.login || '').toLowerCase();
            const state = (review.state || '').toUpperCase();

            const current = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const labels = new Set(current.data.map(l => l.name));

            const clearStatuses = () => ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));

            if (state === 'CHANGES_REQUESTED') {
              clearStatuses();
              labels.add('status:in-dev');
            } else if (state === 'APPROVED' && reviewer === 'leonreviewer') {
              clearStatuses();
              labels.add('status:qa');
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labels]
            });

  pr-close-sync:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Mark merged PR as done
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const current = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const labels = new Set(current.data.map(l => l.name));
            ['status:triage','status:in-dev','status:in-review','status:qa'].forEach(l => labels.delete(l));
            labels.add('status:done');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labels]
            });
