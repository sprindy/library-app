name: team-task-chain-automation

on:
  issues:
    types: [opened, reopened, labeled, assigned]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - run: echo "workflow loaded"
