name: team-task-chain-automation

on:
  issues:
    types: [opened, reopened, labeled, assigned]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-routing-and-kickoff:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Route + kickoff Linus
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;
            const labels = new Set((issue.labels || []).map(l => l.name));

            // Route only on open/reopen for Helen-reported issues.
            if (action === 'opened' || action === 'reopened') {
              const isTesterSource = labels.has('source:tester') || issue.user?.login === 'TesterHelen';
              if (isTesterSource) {
                const statusLabels = ['status:triage','status:in-dev','status:in-review','status:qa','status:done'];
                for (const l of statusLabels) labels.delete(l);
                ['bug','source:tester','role:coder-linus','role:reviewer-leon','role:tester-helen','status:triage'].forEach(l => labels.add(l));

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [...labels]
                });

                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: ['CoderLinus']
                }).catch(() => {});
              }
            }

            // Kickoff when CoderLinus assigned or status:triage labeled.
            const shouldKickoff = (action === 'assigned' && context.payload.assignee?.login === 'CoderLinus') ||
              (action === 'labeled' && context.payload.label?.name === 'status:triage');
            if (!shouldKickoff) return;

            const latest = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });
            const latestLabels = new Set((latest.data.labels || []).map(l => typeof l === 'string' ? l : l.name));
            if (!(latestLabels.has('role:coder-linus') && latestLabels.has('status:triage'))) return;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });
            if (comments.data.some(c => (c.body || '').includes('AUTO_KICKOFF_LINUS'))) return;

            ['status:triage','status:qa','status:in-review','status:done'].forEach(l => latestLabels.delete(l));
            latestLabels.add('status:in-dev');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...latestLabels]
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "🤖 AUTO_KICKOFF_LINUS\n@CoderLinus start implementation now."
            });

      - name: Checkout as Linus token
        if: github.event_name == 'issues' && secrets.CODERLINUS_PAT != ''
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODERLINUS_PAT }}

      - name: Create draft PR scaffold (Linus)
        if: github.event_name == 'issues' && secrets.CODERLINUS_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.CODERLINUS_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTION_NAME: ${{ github.event.action }}
          ASSIGNEE_LOGIN: ${{ github.event.assignee.login }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          if [[ "$ACTION_NAME" != "assigned" && "$ACTION_NAME" != "labeled" ]]; then exit 0; fi
          if [[ "$ACTION_NAME" == "assigned" && "$ASSIGNEE_LOGIN" != "CoderLinus" ]]; then exit 0; fi
          if [[ "$ACTION_NAME" == "labeled" && "$LABEL_NAME" != "status:triage" ]]; then exit 0; fi

          BRANCH="fix/issue-${ISSUE_NUMBER}-autostart"
          git config user.name "CoderLinus"
          git config user.email "coder.linus@protonmail.com"
          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          mkdir -p .github/autostart
          echo "Autostart scaffold for issue #${ISSUE_NUMBER}" > .github/autostart/issue-${ISSUE_NUMBER}.md
          git add .github/autostart/issue-${ISSUE_NUMBER}.md
          git commit -m "chore(autostart): scaffold for issue #${ISSUE_NUMBER}" || true
          git push -u origin "$BRANCH" || true

          EXISTING=$(gh pr list --search "head:${BRANCH} is:open" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create --base main --head "$BRANCH" --title "wip: issue #${ISSUE_NUMBER} implementation" --body "Auto-started by Linus assignment.\n\nCloses #${ISSUE_NUMBER}" --draft
          fi

  reviewers-when-ready:
    if: github.event_name == 'pull_request_target' && github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labelsResp = await github.rest.issues.listLabelsOnIssue({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number });
            const labels = new Set(labelsResp.data.map(l => l.name));
            ['status:triage','status:in-dev','status:qa','status:done'].forEach(l => labels.delete(l));
            labels.add('status:in-review');
            labels.add('role:reviewer-leon');
            labels.add('role:tester-helen');
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });

            const reviewers = ['LeonReviewer','TesterHelen'].filter(r => r.toLowerCase() !== (pr.user?.login || '').toLowerCase());
            if (reviewers.length) {
              await github.rest.pulls.requestReviewers({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, reviewers }).catch(() => {});
            }

  review-status-and-merge:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const state = (context.payload.review?.state || '').toUpperCase();
            const labelsResp = await github.rest.issues.listLabelsOnIssue({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number });
            const labels = new Set(labelsResp.data.map(l => l.name));
            const clear = () => ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));

            if (state === 'CHANGES_REQUESTED') {
              clear(); labels.add('status:in-dev');
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
              return;
            }

            const reviews = await github.rest.pulls.listReviews({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, per_page: 100 });
            const latestByUser = new Map();
            for (const r of reviews.data) latestByUser.set((r.user?.login || '').toLowerCase(), (r.state || '').toUpperCase());

            const leonApproved = latestByUser.get('leonreviewer') === 'APPROVED';
            const helenApproved = latestByUser.get('testerhelen') === 'APPROVED';

            if (leonApproved && !helenApproved) {
              clear(); labels.add('status:qa');
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
              return;
            }

            if (leonApproved && helenApproved) {
              await github.rest.pulls.merge({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, merge_method: 'squash' }).catch(() => {});
            }

  pr-close-sync:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labelsResp = await github.rest.issues.listLabelsOnIssue({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number });
            const labels = new Set(labelsResp.data.map(l => l.name));
            ['status:triage','status:in-dev','status:in-review','status:qa'].forEach(l => labels.delete(l));
            labels.add('status:done');
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
