name: team-task-chain-automation

on:
  issues:
    types: [opened, reopened, labeled, assigned]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-routing:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            const isTesterSource = labels.has('source:tester') || issue.user?.login === 'TesterHelen';
            if (!isTesterSource) return;

            const statusLabels = ['status:triage','status:in-dev','status:in-review','status:qa','status:done'];
            const next = new Set(labels);
            for (const l of statusLabels) next.delete(l);
            ['bug','source:tester','role:coder-linus','role:reviewer-leon','role:tester-helen','status:triage'].forEach(l => next.add(l));

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...next]
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['CoderLinus']
            }).catch(() => {});

  linus-autostart-draft-pr:
    if: github.event_name == 'issues' && ((github.event.action == 'assigned' && github.event.assignee.login == 'CoderLinus') || (github.event.action == 'labeled' && github.event.label.name == 'status:triage'))
    runs-on: ubuntu-latest
    steps:
      - id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            const ok = labels.has('role:coder-linus') && labels.has('status:triage');
            if (!ok) {
              core.setOutput('run', 'false');
              return;
            }
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });
            const exists = comments.data.some(c => (c.body || '').includes('AUTO_KICKOFF_LINUS'));
            core.setOutput('run', exists ? 'false' : 'true');

      - if: steps.gate.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            ['status:triage','status:qa','status:in-review','status:done'].forEach(l => labels.delete(l));
            labels.add('status:in-dev');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels]
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🤖 AUTO_KICKOFF_LINUS\n@CoderLinus start implementation. Draft PR will be auto-created if \`CODERLINUS_PAT\` is configured.`
            });

      - if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT != ''
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODERLINUS_PAT }}

      - if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.CODERLINUS_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="fix/issue-${ISSUE_NUMBER}-autostart"
          git config user.name "CoderLinus"
          git config user.email "coder.linus@protonmail.com"
          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          mkdir -p .github/autostart
          echo "Autostart scaffold for issue #${ISSUE_NUMBER}" > .github/autostart/issue-${ISSUE_NUMBER}.md
          git add .github/autostart/issue-${ISSUE_NUMBER}.md
          git commit -m "chore(autostart): scaffold for issue #${ISSUE_NUMBER}" || true
          git push -u origin "$BRANCH" || true

          EXISTING=$(gh pr list --search "head:${BRANCH} is:open" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "wip: issue #${ISSUE_NUMBER} implementation" \
              --body "Auto-started by Linus assignment.\n\nCloses #${ISSUE_NUMBER}" \
              --draft
          fi

      - if: steps.gate.outputs.run == 'true' && secrets.CODERLINUS_PAT == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '⚠️ `CODERLINUS_PAT` missing: status moved to in-dev, but draft PR auto-create could not run as @CoderLinus.'
            });

  reviewers-when-ready:
    if: github.event_name == 'pull_request_target' && github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labelsResp = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const labels = new Set(labelsResp.data.map(l => l.name));
            ['status:triage','status:in-dev','status:qa','status:done'].forEach(l => labels.delete(l));
            labels.add('status:in-review');
            labels.add('role:reviewer-leon');
            labels.add('role:tester-helen');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labels]
            });

            const reviewers = ['LeonReviewer','TesterHelen'].filter(r => r.toLowerCase() !== (pr.user?.login || '').toLowerCase());
            if (reviewers.length) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers
              }).catch(() => {});
            }

  review-status-sync-and-merge:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const state = (context.payload.review?.state || '').toUpperCase();

            const labelsResp = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const labels = new Set(labelsResp.data.map(l => l.name));
            const clear = () => ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));

            if (state === 'CHANGES_REQUESTED') {
              clear();
              labels.add('status:in-dev');
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
              return;
            }

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const latestByUser = new Map();
            for (const r of reviews.data) latestByUser.set((r.user?.login || '').toLowerCase(), (r.state || '').toUpperCase());

            const leonApproved = latestByUser.get('leonreviewer') === 'APPROVED';
            const helenApproved = latestByUser.get('testerhelen') === 'APPROVED';

            if (leonApproved && !helenApproved) {
              clear();
              labels.add('status:qa');
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
              return;
            }

            if (leonApproved && helenApproved) {
              // Merge only after Helen test done (approved) and Leon approved.
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              }).catch(() => {});
            }

  pr-close-sync:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labelsResp = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const labels = new Set(labelsResp.data.map(l => l.name));
            ['status:triage','status:in-dev','status:in-review','status:qa'].forEach(l => labels.delete(l));
            labels.add('status:done');
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
