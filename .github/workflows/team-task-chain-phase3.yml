name: team-task-chain-phase3

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
  pull_request_review:
    types: [submitted]

permissions:
  issues: write
  pull-requests: write

jobs:
  pr-open-routing:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr || pr.draft) return;

            const body = pr.body || '';
            const matches = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/ig)];
            const issueNumbers = [...new Set(matches.map(m => Number(m[1])).filter(Boolean))];
            if (!issueNumbers.length) {
              core.info('No linked issue via closing keywords.');
              return;
            }

            let routedAny = false;
            for (const issue_number of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number
              });

              const labels = new Set((issue.labels || []).map(l => typeof l === 'string' ? l : l.name));
              const isTesterFlow = labels.has('source:tester') && labels.has('role:coder-linus');
              if (!isTesterFlow) continue;

              ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));
              labels.add('status:in-review');

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: [...labels]
              });

              routedAny = true;
            }

            if (!routedAny) {
              core.info('No tester-flow linked issue found; skip reviewer auto-request.');
              return;
            }

            // Request Leon + Helen reviewers (best effort/idempotent)
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: ['ReviewerLeon', 'TesterHelen']
            }).catch(err => core.warning(`requestReviewers failed: ${err.message}`));

  pr-review-approved-routing:
    if: github.event_name == 'pull_request_review' && github.event.action == 'submitted'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const review = context.payload.review;
            const pr = context.payload.pull_request;
            if (!review || !pr) return;

            if ((review.state || '').toLowerCase() !== 'approved') return;
            if (review.user?.login !== 'ReviewerLeon') {
              core.info(`Skip: approver is ${review.user?.login}, not ReviewerLeon`);
              return;
            }

            const body = pr.body || '';
            const matches = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/ig)];
            const issueNumbers = [...new Set(matches.map(m => Number(m[1])).filter(Boolean))];
            if (!issueNumbers.length) return;

            for (const issue_number of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number
              });

              const labels = new Set((issue.labels || []).map(l => typeof l === 'string' ? l : l.name));
              const isTesterFlow = labels.has('source:tester') && labels.has('role:reviewer-leon');
              if (!isTesterFlow) continue;

              ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));
              labels.add('status:qa');

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: [...labels]
              });
            }

  pr-merged-routing:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const body = pr.body || '';
            const matches = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/ig)];
            const issueNumbers = [...new Set(matches.map(m => Number(m[1])).filter(Boolean))];
            if (!issueNumbers.length) return;

            for (const issue_number of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number
              });

              const labels = new Set((issue.labels || []).map(l => typeof l === 'string' ? l : l.name));
              const isTesterFlow = labels.has('source:tester');
              if (!isTesterFlow) continue;

              ['status:triage','status:in-dev','status:in-review','status:qa','status:done'].forEach(l => labels.delete(l));
              labels.add('status:done');

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: [...labels]
              });
            }
